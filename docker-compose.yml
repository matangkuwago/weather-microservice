version: '3.8'

services:

  backend:
    build:
      context: ./backend
    container_name: weather_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/weather.db:/app/weather.db
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weather_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped