services:

  backend:
    build:
      context: ./backend
    container_name: weather_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weather_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    build:
      context: ./backend
      dockerfile: Dockerfile.Ollama
      args:
        - AI_PROVIDER=${AI_PROVIDER:-ollama}
    container_name: weather_ollama
    ports:
      - "11434:11434"
    restart: unless-stopped